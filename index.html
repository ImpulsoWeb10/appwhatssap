<script>
const API_URL = "COLE_SUA_URL_AQUI";

/* Toast seguro */
function showToast(msg, tipo = 'success') {
  const t = document.getElementById('toast');
  if (!t) return;
  t.textContent = msg;
  t.className = `show ${tipo}`;
  setTimeout(() => { t.className = ''; }, 3000);
}

/* Limpar telefone */
function limparTelefone(tel) {
  return tel.replace(/\D/g, '');
}

/* SALVAR CLIENTE */
async function salvarCliente() {
  try {
    const nome = document.getElementById('nome').value.trim();
    const telefone = limparTelefone(document.getElementById('telefone').value);
    const descricao = document.getElementById('descricao').value.trim();

    if (!nome || !telefone) {
      showToast('Preencha nome e telefone', 'error');
      return;
    }

    const url = `${API_URL}?action=salvar&nome=${encodeURIComponent(nome)}&telefone=${telefone}&descricao=${encodeURIComponent(descricao)}`;

    const res = await fetch(url);
    const texto = await res.text();

    let data;
    try {
      data = JSON.parse(texto);
    } catch {
      console.error("Resposta não é JSON:", texto);
      showToast('Erro na API (não é JSON)', 'error');
      return;
    }

    if (data.error) {
      showToast(data.error, 'error');
      return;
    }

    showToast('Cliente salvo!', 'success');

    document.getElementById('nome').value = '';
    document.getElementById('telefone').value = '';
    document.getElementById('descricao').value = '';

    carregarClientes();

  } catch (e) {
    console.error(e);
    showToast('Erro ao salvar', 'error');
  }
}

/* CARREGAR CLIENTES */
async function carregarClientes() {
  try {
    const res = await fetch(`${API_URL}?action=listar`);
    const texto = await res.text();

    let clientes;
    try {
      clientes = JSON.parse(texto);
    } catch {
      console.error("Resposta inválida:", texto);
      showToast('Erro ao carregar dados', 'error');
      renderLista([]);
      atualizarStats([]);
      return;
    }

    renderLista(clientes || []);
    atualizarStats(clientes || []);

  } catch (e) {
    console.error(e);
    showToast('Erro de conexão', 'error');
    renderLista([]);
    atualizarStats([]);
  }
}

/* RENDER LISTA */
function renderLista(clientes) {
  const lista = document.getElementById('lista');
  if (!lista) return;

  if (!clientes.length) {
    lista.innerHTML = '<div class="empty-state">Nenhum cliente</div>';
    return;
  }

  lista.innerHTML = clientes.map(c => {
    const wa = `https://wa.me/${c.telefone}?text=${encodeURIComponent("Olá, poderia avaliar nosso serviço?")}`;

    return `
      <div class="client-card">
        <div class="avatar">${c.nome ? c.nome[0] : "?"}</div>

        <div class="client-info">
          <div class="name">${c.nome || ''}</div>
          <div class="phone">${c.telefone || ''}</div>
          <div class="desc">${c.descricao || ''}</div>
        </div>

        <div class="client-actions">
          <a href="${wa}" target="_blank" class="btn btn-sm btn-whats">📲</a>
        </div>
      </div>
    `;
  }).join('');
}

/* STATS */
function atualizarStats(clientes) {
  document.getElementById('statTotal').textContent = clientes.length;
  document.getElementById('statSent').textContent = clientes.filter(c => c.linkEnviado).length;
  document.getElementById('statPending').textContent = clientes.length;
}

/* INIT */
window.onload = () => {
  carregarClientes();
};
</script>
