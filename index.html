<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ClientesPro — Controle de Clientes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:      #0d0f14;
      --surface: #161a22;
      --card:    #1e2330;
      --border:  #2a3040;
      --accent:  #3ecf8e;
      --accent2: #2ea374;
      --warn:    #f97316;
      --danger:  #ef4444;
      --gold:    #f59e0b;
      --text:    #e8eaf0;
      --muted:   #7a8398;
      --radius:  14px;
      --shadow:  0 4px 24px rgba(0,0,0,.45);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 0 0 60px; }

    /* ── HEADER ── */
    header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 16px 28px; display: flex; align-items: center; gap: 14px; position: sticky; top: 0; z-index: 100; backdrop-filter: blur(8px); }
    .logo-icon { width: 42px; height: 42px; background: var(--accent); border-radius: 12px; display: grid; place-items: center; font-size: 20px; flex-shrink: 0; }
    header h1 { font-family: 'Sora', sans-serif; font-size: 1.3rem; font-weight: 700; color: var(--text); letter-spacing: -.02em; }
    header p { font-size: .78rem; color: var(--muted); margin-top: 1px; }
    .header-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
    .badge-count { background: var(--card); border: 1px solid var(--border); color: var(--accent); font-family: 'Sora', sans-serif; font-size: .8rem; font-weight: 700; padding: 4px 12px; border-radius: 999px; }
    .btn-clientes-salvos { background: var(--card); border: 1.5px solid var(--accent); color: var(--accent); border-radius: 10px; padding: 8px 16px; cursor: pointer; font-family: 'Sora', sans-serif; font-size: .82rem; font-weight: 700; display: flex; align-items: center; gap: 6px; transition: background .2s, transform .15s, box-shadow .2s; white-space: nowrap; }
    .btn-clientes-salvos:hover { background: rgba(62,207,142,.12); box-shadow: 0 0 14px rgba(62,207,142,.25); transform: translateY(-1px); }
    .btn-clientes-salvos.aberto { background: rgba(62,207,142,.15); }

    /* ── MAIN ── */
    main { max-width: 960px; margin: 0 auto; padding: 32px 20px 0; }
    .section-title { display: block; font-family: 'Sora', sans-serif; font-size: .7rem; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); margin-bottom: 14px; }

    /* ── FORM ── */
    .form-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px; margin-bottom: 32px; box-shadow: var(--shadow); animation: slideDown .35s ease both; }
    .form-card h2 { font-family: 'Sora', sans-serif; font-size: 1.1rem; font-weight: 700; margin-bottom: 22px; display: flex; align-items: center; gap: 8px; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .form-grid .full { grid-column: 1 / -1; }
    label { display: block; font-size: .78rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 6px; }
    input, textarea, select { width: 100%; background: var(--surface); border: 1.5px solid var(--border); border-radius: 10px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: .95rem; padding: 11px 14px; outline: none; transition: border-color .2s, box-shadow .2s; }
    input[type="date"] { color-scheme: dark; }
    input::placeholder, textarea::placeholder { color: var(--muted); }
    input:focus, textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(62,207,142,.15); }
    textarea { resize: vertical; min-height: 80px; }
    .btn-primary { margin-top: 6px; width: 100%; background: var(--accent); color: #0d0f14; border: none; border-radius: 10px; font-family: 'Sora', sans-serif; font-size: .95rem; font-weight: 700; padding: 13px 20px; cursor: pointer; transition: transform .15s, background .2s, box-shadow .2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .btn-primary:hover { background: var(--accent2); box-shadow: 0 4px 20px rgba(62,207,142,.35); transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary:disabled { opacity: .5; cursor: not-allowed; transform: none; }

    /* ── PAINEL CLIENTES ── */
    #painel-clientes { display: none; animation: slideDown .3s ease both; }
    #painel-clientes.visivel { display: block; }
    .search-row { display: flex; gap: 12px; margin-bottom: 20px; align-items: center; }
    .search-wrap { position: relative; flex: 1; }
    .search-wrap svg { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; }
    #busca { padding-left: 40px; background: var(--card); border-color: var(--border); }
    .btn-refresh { background: var(--card); border: 1.5px solid var(--border); color: var(--text); border-radius: 10px; padding: 11px 16px; cursor: pointer; font-size: .85rem; font-weight: 600; display: flex; align-items: center; gap: 6px; transition: border-color .2s, color .2s; white-space: nowrap; }
    .btn-refresh:hover { border-color: var(--accent); color: var(--accent); }
    #lista-clientes { display: flex; flex-direction: column; gap: 12px; }

    /* ── CARDS ── */
    .cliente-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px 22px; display: flex; align-items: center; gap: 18px; transition: border-color .2s, transform .2s; animation: slideUp .3s ease both; cursor: pointer; }
    .cliente-card:hover { border-color: rgba(62,207,142,.45); transform: translateY(-2px); box-shadow: 0 4px 20px rgba(0,0,0,.3); }
    .cliente-card.link-enviado { border-left: 3px solid var(--accent); }
    .cliente-card.aniversario { border-color: var(--gold); background: linear-gradient(135deg, #1e2330, #2a2010); box-shadow: 0 0 20px rgba(245,158,11,.2); }
    .aniv-badge { font-size: .72rem; font-weight: 700; letter-spacing: .07em; text-transform: uppercase; padding: 3px 10px; border-radius: 999px; background: rgba(245,158,11,.15); color: var(--gold); border: 1px solid rgba(245,158,11,.4); flex-shrink: 0; }
    .edit-hint { font-size: .7rem; color: var(--muted); margin-top: 4px; opacity: .7; }
    .avatar { width: 46px; height: 46px; border-radius: 12px; background: linear-gradient(135deg, #1f5c42, #3ecf8e22); border: 1.5px solid rgba(62,207,142,.25); display: grid; place-items: center; font-family: 'Sora', sans-serif; font-weight: 800; font-size: 1.1rem; color: var(--accent); flex-shrink: 0; }
    .cliente-card.aniversario .avatar { background: linear-gradient(135deg, #5c3a1f, #f59e0b22); border-color: rgba(245,158,11,.4); color: var(--gold); }
    .cliente-info { flex: 1; min-width: 0; }
    .cliente-nome { font-family: 'Sora', sans-serif; font-weight: 700; font-size: 1rem; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .cliente-tel { font-size: .83rem; color: var(--muted); margin-top: 2px; }
    .cliente-desc { font-size: .82rem; color: var(--muted); margin-top: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .cliente-aniv { font-size: .82rem; color: var(--gold); margin-top: 4px; }
    .status-badge { font-size: .72rem; font-weight: 700; letter-spacing: .07em; text-transform: uppercase; padding: 3px 10px; border-radius: 999px; flex-shrink: 0; }
    .status-badge.enviado { background: rgba(62,207,142,.15); color: var(--accent); border: 1px solid rgba(62,207,142,.3); }
    .status-badge.pendente { background: rgba(249,115,22,.1); color: var(--warn); border: 1px solid rgba(249,115,22,.25); }
    .acoes { display: flex; gap: 8px; flex-shrink: 0; }
    .btn-icon { width: 38px; height: 38px; border-radius: 10px; border: 1.5px solid var(--border); background: var(--surface); cursor: pointer; display: grid; place-items: center; font-size: 1rem; transition: border-color .2s, background .2s, transform .15s; }
    .btn-icon:hover { transform: scale(1.1); }
    .btn-icon.wpp:hover { border-color: #25d366; background: rgba(37,211,102,.1); }
    .btn-icon.toggle:hover { border-color: var(--accent); background: rgba(62,207,142,.1); }
    .btn-icon.del:hover { border-color: var(--danger); background: rgba(239,68,68,.1); }

    /* ── EMPTY / LOADING ── */
    .empty { text-align: center; padding: 60px 20px; color: var(--muted); }
    .empty .empty-icon { font-size: 3rem; margin-bottom: 14px; opacity: .4; }
    .empty p { font-size: .9rem; }
    .loading { text-align: center; padding: 40px; color: var(--muted); font-size: .9rem; display: flex; align-items: center; justify-content: center; gap: 10px; }
    .spinner { width: 20px; height: 20px; border: 2.5px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }

    /* ── TOAST ── */
    #toast-container { position: fixed; bottom: 24px; right: 24px; display: flex; flex-direction: column; gap: 10px; z-index: 9999; }
    .toast { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 13px 18px; font-size: .88rem; font-weight: 500; display: flex; align-items: center; gap: 10px; box-shadow: 0 8px 32px rgba(0,0,0,.5); animation: toastIn .3s ease both; max-width: 320px; }
    .toast.sucesso { border-color: rgba(62,207,142,.4); }
    .toast.sucesso .toast-icon { color: var(--accent); }
    .toast.erro { border-color: rgba(239,68,68,.4); }
    .toast.erro .toast-icon { color: var(--danger); }
    .toast.info { border-color: rgba(99,160,255,.4); }
    .toast.info .toast-icon { color: #63a0ff; }
    .toast-icon { font-size: 1.1rem; flex-shrink: 0; }
    .toast.saindo { animation: toastOut .3s ease forwards; }

    /* ── MODAL BASE ── */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.75); backdrop-filter: blur(6px); z-index: 9000; display: flex; align-items: center; justify-content: center; padding: 20px; animation: fadeIn .3s ease both; }
    .modal-overlay.saindo { animation: fadeOut .3s ease forwards; }

    /* ── MODAL ANIVERSÁRIO ── */
    .modal-aniv-box { background: var(--card); border: 2px solid var(--gold); border-radius: 20px; padding: 36px 32px; max-width: 480px; width: 100%; text-align: center; box-shadow: 0 0 80px rgba(245,158,11,.4), 0 0 30px rgba(245,158,11,.2), var(--shadow); animation: popIn .4s cubic-bezier(.34,1.56,.64,1) both; position: relative; overflow: hidden; }
    .modal-aniv-box::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, rgba(245,158,11,.08), transparent 60%); pointer-events: none; }
    .modal-emoji { font-size: 4.5rem; margin-bottom: 10px; animation: bounce 1.2s ease infinite; display: block; }
    .modal-title { font-family: 'Sora', sans-serif; font-size: 1.6rem; font-weight: 800; color: var(--gold); margin-bottom: 6px; text-shadow: 0 0 20px rgba(245,158,11,.5); }
    .modal-subtitle { font-size: .95rem; color: var(--muted); margin-bottom: 22px; }
    .modal-nomes { display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px; }
    .modal-nome-item { background: rgba(245,158,11,.1); border: 1px solid rgba(245,158,11,.35); border-radius: 12px; padding: 12px 18px; display: flex; align-items: center; gap: 12px; }
    .modal-nome-avatar { width: 42px; height: 42px; border-radius: 10px; background: rgba(245,158,11,.25); display: grid; place-items: center; font-family: 'Sora', sans-serif; font-weight: 800; font-size: 1.1rem; color: var(--gold); flex-shrink: 0; }
    .modal-nome-info { text-align: left; }
    .modal-nome-info strong { display: block; font-family: 'Sora', sans-serif; font-weight: 700; color: var(--text); }
    .modal-nome-info span { font-size: .82rem; color: var(--muted); }
    .modal-btn-wpp { width: 100%; background: #25d366; color: #fff; border: none; border-radius: 10px; font-family: 'Sora', sans-serif; font-size: .92rem; font-weight: 700; padding: 13px 20px; cursor: pointer; margin-bottom: 10px; transition: background .2s, transform .15s, box-shadow .2s; display: flex; align-items: center; justify-content: center; gap: 8px; box-shadow: 0 4px 16px rgba(37,211,102,.3); }
    .modal-btn-wpp:hover { background: #1fba58; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(37,211,102,.4); }
    .modal-btn-fechar { width: 100%; background: transparent; color: var(--muted); border: 1.5px solid var(--border); border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: .88rem; font-weight: 600; padding: 11px 20px; cursor: pointer; transition: border-color .2s, color .2s; }
    .modal-btn-fechar:hover { border-color: var(--muted); color: var(--text); }

    /* ── MODAL EDIÇÃO ── */
    .modal-edit-box { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 32px 28px; max-width: 520px; width: 100%; box-shadow: var(--shadow); animation: popIn .35s cubic-bezier(.34,1.56,.64,1) both; max-height: 90vh; overflow-y: auto; }
    .modal-edit-box h3 { font-family: 'Sora', sans-serif; font-size: 1.1rem; font-weight: 700; margin-bottom: 22px; display: flex; align-items: center; gap: 8px; }
    .modal-edit-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .modal-edit-grid .full { grid-column: 1 / -1; }
    .btn-row { display: flex; gap: 10px; margin-top: 6px; }
    .btn-secundario { flex: 1; background: transparent; color: var(--muted); border: 1.5px solid var(--border); border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: .9rem; font-weight: 600; padding: 12px 16px; cursor: pointer; transition: border-color .2s, color .2s; }
    .btn-secundario:hover { border-color: var(--muted); color: var(--text); }
    .btn-salvar-edit { flex: 2; background: var(--accent); color: #0d0f14; border: none; border-radius: 10px; font-family: 'Sora', sans-serif; font-size: .92rem; font-weight: 700; padding: 12px 16px; cursor: pointer; transition: background .2s, transform .15s; display: flex; align-items: center; justify-content: center; gap: 6px; }
    .btn-salvar-edit:hover { background: var(--accent2); transform: translateY(-1px); }
    .btn-salvar-edit:disabled { opacity: .5; cursor: not-allowed; transform: none; }

    /* ── ANIMATIONS ── */
    @keyframes slideDown { from { opacity: 0; transform: translateY(-16px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes toastIn { from { opacity: 0; transform: translateX(24px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes toastOut { to { opacity: 0; transform: translateX(24px); } }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes fadeOut { to { opacity: 0; } }
    @keyframes popIn { from { opacity: 0; transform: scale(.85); } to { opacity: 1; transform: scale(1); } }
    @keyframes bounce { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }

    @media (max-width: 620px) {
      .form-grid, .modal-edit-grid { grid-template-columns: 1fr; }
      .form-grid .full, .modal-edit-grid .full { grid-column: 1; }
      .cliente-card { flex-wrap: wrap; }
      .acoes { width: 100%; justify-content: flex-end; }
      .search-row { flex-wrap: wrap; }
      header h1 { font-size: 1.1rem; }
      .btn-clientes-salvos .label { display: none; }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="logo-icon">👥</div>
    <div>
      <h1>ClientesPro</h1>
      <p>Controle de clientes &amp; links de avaliação</p>
    </div>
    <div class="header-right">
      <div class="badge-count" id="badge-count">0 clientes</div>
      <button class="btn-clientes-salvos" id="btn-clientes-salvos" onclick="togglePainel()">
        📋 <span class="label">Clientes Salvos</span>
      </button>
    </div>
  </header>

  <!-- MODAL ANIVERSÁRIO -->
  <div id="modal-aniv" class="modal-overlay" style="display:none">
    <div class="modal-aniv-box">
      <span class="modal-emoji">🎂</span>
      <div class="modal-title">Parabéns hoje!</div>
      <div class="modal-subtitle" id="modal-subtitulo"></div>
      <div class="modal-nomes" id="modal-lista-nomes"></div>
      <button class="modal-btn-wpp" onclick="enviarParabensWhatsApp()">💬 Enviar parabéns pelo WhatsApp</button>
      <button class="modal-btn-fechar" onclick="fecharModalAniv()">Fechar</button>
    </div>
  </div>

  <!-- MODAL EDIÇÃO -->
  <div id="modal-edit" class="modal-overlay" style="display:none">
    <div class="modal-edit-box">
      <h3>✏️ Editar Cliente</h3>
      <div class="modal-edit-grid">
        <div>
          <label for="edit-nome">Nome completo</label>
          <input id="edit-nome" type="text" placeholder="Nome completo" />
        </div>
        <div>
          <label for="edit-tel">Telefone (WhatsApp)</label>
          <input id="edit-tel" type="tel" placeholder="Ex: 11999998888" maxlength="15" />
        </div>
        <div>
          <label for="edit-aniv">Data de aniversário</label>
          <input id="edit-aniv" type="date" />
        </div>
        <div></div>
        <div class="full">
          <label for="edit-desc">O que comprou / serviço</label>
          <textarea id="edit-desc" placeholder="Ex: Corte + barba premium"></textarea>
        </div>
        <div class="full btn-row">
          <button class="btn-secundario" onclick="fecharModalEdit()">Cancelar</button>
          <button class="btn-salvar-edit" id="btn-salvar-edit" onclick="salvarEdicao()">💾 Salvar Alterações</button>
        </div>
      </div>
    </div>
  </div>

  <!-- MAIN -->
  <main>
    <div class="form-card">
      <h2>➕ Novo Cliente</h2>
      <div class="form-grid">
        <div>
          <label for="inp-nome">Nome completo</label>
          <input id="inp-nome" type="text" placeholder="Ex: João da Silva" />
        </div>
        <div>
          <label for="inp-tel">Telefone (WhatsApp)</label>
          <input id="inp-tel" type="tel" placeholder="Ex: 11999998888" maxlength="15" />
        </div>
        <div>
          <label for="inp-aniv">Data de aniversário</label>
          <input id="inp-aniv" type="date" />
        </div>
        <div></div>
        <div class="full">
          <label for="inp-desc">O que comprou / serviço</label>
          <textarea id="inp-desc" placeholder="Ex: Corte + barba premium"></textarea>
        </div>
        <div class="full">
          <button class="btn-primary" id="btn-salvar" onclick="salvarCliente()">💾 Salvar Cliente</button>
        </div>
      </div>
    </div>

    <div id="painel-clientes">
      <span class="section-title">📋 Clientes Cadastrados</span>
      <div class="search-row">
        <div class="search-wrap">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input id="busca" type="search" placeholder="Buscar por nome ou telefone…" oninput="filtrarClientes()" />
        </div>
        <button class="btn-refresh" onclick="carregarClientes()">🔄 Atualizar</button>
      </div>
      <div id="lista-clientes"></div>
    </div>
  </main>

  <div id="toast-container"></div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbyxmKZ57ZX5UH_O79NQpPl1vMMn9lRwdf9eSECCKRJgRcltO4v0es3Jfiw5C67_FVDr/exec";

    let todosClientes = [];
    let aniversariantesHoje = [];
    let painelAberto = false;
    let listaCarregada = false;
    let clienteEditando = null;

    // ── Painel toggle ────────────────────────────────────────
    function togglePainel() {
      painelAberto = !painelAberto;
      const painel = document.getElementById("painel-clientes");
      const btn = document.getElementById("btn-clientes-salvos");
      if (painelAberto) {
        painel.classList.add("visivel");
        btn.classList.add("aberto");
        btn.innerHTML = `📋 <span class="label">Fechar Lista</span>`;
        if (!listaCarregada) carregarClientes();
        else renderizarClientes(todosClientes);
      } else {
        painel.classList.remove("visivel");
        btn.classList.remove("aberto");
        btn.innerHTML = `📋 <span class="label">Clientes Salvos</span>`;
      }
    }

    // ── Formatação ───────────────────────────────────────────
    function formatarTelefone(tel) {
      const n = String(tel).replace(/\D/g, "");
      if (n.length === 11) return `(${n.slice(0,2)}) ${n.slice(2,7)}-${n.slice(7)}`;
      if (n.length === 10) return `(${n.slice(0,2)}) ${n.slice(2,6)}-${n.slice(6)}`;
      return tel;
    }

    function formatarAniversario(data) {
      if (!data) return "";
      const s = String(data).trim();
      let dia, mes;
      if (s.includes("-")) {
        const partes = s.split("T")[0].split("-");
        mes = partes[1]; dia = partes[2];
      } else if (s.includes("/")) {
        const partes = s.split("/");
        dia = partes[0]; mes = partes[1];
      } else return "";
      if (!dia || !mes) return "";
      return `${dia}/${mes}`;
    }

    function formatarCadastro(data) {
      if (!data) return "";
      const s = String(data).trim();
      if (s.includes("/")) return s.split(",")[0];
      const d = new Date(s);
      if (isNaN(d)) return s;
      return d.toLocaleDateString("pt-BR");
    }

    // Converte qualquer formato de data para YYYY-MM-DD (para input type="date")
    function paraInputDate(data) {
      if (!data) return "";
      const s = String(data).trim();
      if (!s) return "";
      // Já está em YYYY-MM-DD
      if (/^\d{4}-\d{2}-\d{2}/.test(s)) return s.split("T")[0];
      // DD/MM/YYYY
      if (/^\d{2}\/\d{2}\/\d{4}/.test(s)) {
        const p = s.split("/");
        return `${p[2]}-${p[1]}-${p[0]}`;
      }
      return "";
    }

    function inicial(nome) { return (nome || "?").trim().charAt(0).toUpperCase(); }

    function ehAniversarioHoje(data) {
      if (!data) return false;
      const s = String(data).trim();
      let dia, mes;
      if (s.includes("-")) { const p = s.split("T")[0].split("-"); mes = parseInt(p[1])-1; dia = parseInt(p[2]); }
      else if (s.includes("/")) { const p = s.split("/"); dia = parseInt(p[0]); mes = parseInt(p[1])-1; }
      else return false;
      const hoje = new Date();
      return dia === hoje.getDate() && mes === hoje.getMonth();
    }

    // ── Toast ────────────────────────────────────────────────
    function toast(msg, tipo = "sucesso") {
      const icons = { sucesso: "✅", erro: "❌", info: "ℹ️" };
      const el = document.createElement("div");
      el.className = `toast ${tipo}`;
      el.innerHTML = `<span class="toast-icon">${icons[tipo]}</span> ${msg}`;
      document.getElementById("toast-container").appendChild(el);
      setTimeout(() => { el.classList.add("saindo"); el.addEventListener("animationend", () => el.remove()); }, 3500);
    }

    // ── Modal aniversário ────────────────────────────────────
    function mostrarModalAniversario(lista) {
      aniversariantesHoje = lista;
      document.getElementById("modal-subtitulo").textContent = lista.length === 1
        ? `${lista[0].nome} faz aniversário hoje! 🎉`
        : `${lista.length} clientes fazem aniversário hoje! 🎉`;
      document.getElementById("modal-lista-nomes").innerHTML = lista.map(c => `
        <div class="modal-nome-item">
          <div class="modal-nome-avatar">${inicial(c.nome)}</div>
          <div class="modal-nome-info">
            <strong>${escapeHtml(c.nome)}</strong>
            <span>📱 ${formatarTelefone(c.telefone)}</span>
          </div>
        </div>`).join("");
      const btn = document.querySelector(".modal-btn-wpp");
      btn.innerHTML = lista.length === 1 ? "💬 Enviar parabéns pelo WhatsApp" : `💬 Enviar parabéns para todos (${lista.length})`;
      document.getElementById("modal-aniv").style.display = "flex";
    }

    function fecharModalAniv() {
      const m = document.getElementById("modal-aniv");
      m.classList.add("saindo");
      setTimeout(() => { m.style.display = "none"; m.classList.remove("saindo"); }, 300);
    }

    function enviarParabensWhatsApp() {
      aniversariantesHoje.forEach(c => {
        const n = String(c.telefone).replace(/\D/g, "");
        const num = n.startsWith("55") ? n : `55${n}`;
        window.open(`https://wa.me/${num}?text=${encodeURIComponent(`🎂 Parabéns, ${c.nome}! Feliz aniversário! 🥳🎉`)}`, "_blank");
      });
      fecharModalAniv();
    }

    // ── Modal edição ─────────────────────────────────────────
    function abrirModalEdit(cliente) {
      clienteEditando = cliente;
      document.getElementById("edit-nome").value = cliente.nome || "";
      document.getElementById("edit-tel").value  = formatarTelefone(cliente.telefone);
      document.getElementById("edit-desc").value = cliente.descricao || "";
      document.getElementById("edit-aniv").value = paraInputDate(cliente.aniversario);
      document.getElementById("modal-edit").style.display = "flex";
    }

    function fecharModalEdit() {
      const m = document.getElementById("modal-edit");
      m.classList.add("saindo");
      setTimeout(() => { m.style.display = "none"; m.classList.remove("saindo"); clienteEditando = null; }, 300);
    }

    async function salvarEdicao() {
      if (!clienteEditando) return;
      const nome = document.getElementById("edit-nome").value.trim();
      const tel  = document.getElementById("edit-tel").value.replace(/\D/g, "");
      const desc = document.getElementById("edit-desc").value.trim();
      const aniv = document.getElementById("edit-aniv").value.trim();
      const btn  = document.getElementById("btn-salvar-edit");

      if (!nome || !tel) { toast("Preencha nome e telefone.", "erro"); return; }

      btn.disabled = true;
      btn.innerHTML = `<div class="spinner" style="border-top-color:#0d0f14;width:16px;height:16px"></div> Salvando…`;

      try {
        const params = new URLSearchParams({
          action: "editar",
          id: clienteEditando.id,
          nome, telefone: tel, descricao: desc, aniversario: aniv
        });
        const res = await fetch(`${API_URL}?${params}`);
        const data = await res.json();
        if (!data.sucesso) throw new Error(data.mensagem);
        toast(`✅ ${nome} atualizado!`, "sucesso");
        fecharModalEdit();
        const r2 = await fetch(`${API_URL}?action=listar`);
        const d2 = await r2.json();
        if (d2.sucesso) {
          todosClientes = d2.clientes || [];
          listaCarregada = true;
          atualizarBadge(todosClientes.length);
          if (painelAberto) renderizarClientes(todosClientes);
        }
      } catch (err) {
        toast(err.message || "Erro ao editar.", "erro");
      } finally {
        btn.disabled = false;
        btn.innerHTML = "💾 Salvar Alterações";
      }
    }

    // ── Carregar ─────────────────────────────────────────────
    async function carregarClientes() {
      const lista = document.getElementById("lista-clientes");
      lista.innerHTML = `<div class="loading"><div class="spinner"></div> Carregando clientes…</div>`;
      try {
        const res = await fetch(`${API_URL}?action=listar`);
        const data = await res.json();
        if (!data.sucesso) throw new Error(data.mensagem);
        todosClientes = data.clientes || [];
        listaCarregada = true;
        renderizarClientes(todosClientes);
        atualizarBadge(todosClientes.length);
        const anivHoje = todosClientes.filter(c => ehAniversarioHoje(c.aniversario));
        if (anivHoje.length > 0) mostrarModalAniversario(anivHoje);
      } catch (err) {
        lista.innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div><p>Erro: ${err.message}</p></div>`;
        toast("Erro ao carregar clientes.", "erro");
      }
    }

    // ── Renderizar ───────────────────────────────────────────
    function renderizarClientes(clientes) {
      const lista = document.getElementById("lista-clientes");
      if (!clientes.length) {
        lista.innerHTML = `<div class="empty"><div class="empty-icon">📭</div><p>Nenhum cliente encontrado.</p></div>`;
        return;
      }
      lista.innerHTML = clientes.map((c, i) => {
        const isAniv = ehAniversarioHoje(c.aniversario);
        const anivFmt = formatarAniversario(c.aniversario);
        const cadFmt  = formatarCadastro(c.criadoEm);
        return `
        <div class="cliente-card ${c.linkEnviado ? 'link-enviado' : ''} ${isAniv ? 'aniversario' : ''}"
             id="card-${c.id}" style="animation-delay:${i*40}ms"
             onclick="abrirModalEdit(todosClientes.find(x=>x.id==='${c.id}'))">
          <div class="avatar">${inicial(c.nome)}</div>
          <div class="cliente-info">
            <div class="cliente-nome">${isAniv ? '🎂 ' : ''}${escapeHtml(c.nome)}</div>
            <div class="cliente-tel">📱 ${formatarTelefone(c.telefone)}</div>
            ${c.descricao ? `<div class="cliente-desc">🛒 ${escapeHtml(c.descricao)}</div>` : ""}
            ${anivFmt    ? `<div class="cliente-aniv">🎂 Aniv: ${anivFmt}</div>` : ""}
            ${cadFmt     ? `<div class="cliente-desc">📅 Cadastrado: ${cadFmt}</div>` : ""}
            <div class="edit-hint">✏️ Clique para editar</div>
          </div>
          ${isAniv ? `<span class="aniv-badge">🎉 Hoje!</span>` : `<span class="status-badge ${c.linkEnviado ? 'enviado' : 'pendente'}">${c.linkEnviado ? "⭐ Enviado" : "⏳ Pendente"}</span>`}
          <div class="acoes" onclick="event.stopPropagation()">
            <button class="btn-icon wpp"    title="WhatsApp" onclick="abrirWhatsApp('${c.telefone}')">💬</button>
            <button class="btn-icon toggle" title="${c.linkEnviado ? 'Marcar pendente' : 'Marcar enviado'}" onclick="toggleLink('${c.id}',${!c.linkEnviado})">⭐</button>
            <button class="btn-icon del"    title="Excluir" onclick="excluirCliente('${c.id}','${escapeHtml(c.nome)}')">🗑️</button>
          </div>
        </div>`;
      }).join("");
    }

    function filtrarClientes() {
      const q = document.getElementById("busca").value.toLowerCase();
      renderizarClientes(todosClientes.filter(c => c.nome.toLowerCase().includes(q) || String(c.telefone).includes(q)));
    }

    function atualizarBadge(n) {
      document.getElementById("badge-count").textContent = `${n} cliente${n !== 1 ? "s" : ""}`;
    }

    // ── Salvar novo ──────────────────────────────────────────
    async function salvarCliente() {
      const nome = document.getElementById("inp-nome").value.trim();
      const tel  = document.getElementById("inp-tel").value.replace(/\D/g, "");
      const desc = document.getElementById("inp-desc").value.trim();
      const aniv = document.getElementById("inp-aniv").value.trim();
      const btn  = document.getElementById("btn-salvar");

      if (!nome || !tel) { toast("Preencha nome e telefone.", "erro"); return; }
      if (tel.length < 10) { toast("Telefone inválido (mínimo 10 dígitos).", "erro"); return; }

      btn.disabled = true;
      btn.innerHTML = `<div class="spinner" style="border-top-color:#0d0f14;width:18px;height:18px"></div> Salvando…`;

      try {
        const params = new URLSearchParams({ action: "salvar", nome, telefone: tel, descricao: desc, aniversario: aniv });
        const res = await fetch(`${API_URL}?${params}`);
        const data = await res.json();
        if (!data.sucesso) throw new Error(data.mensagem);
        toast(`✅ ${nome} cadastrado!`, "sucesso");
        document.getElementById("inp-nome").value = "";
        document.getElementById("inp-tel").value  = "";
        document.getElementById("inp-desc").value = "";
        document.getElementById("inp-aniv").value = "";
        const r2 = await fetch(`${API_URL}?action=listar`);
        const d2 = await r2.json();
        if (d2.sucesso) {
          todosClientes = d2.clientes || [];
          listaCarregada = true;
          atualizarBadge(todosClientes.length);
          if (painelAberto) renderizarClientes(todosClientes);
        }
      } catch (err) {
        toast(err.message || "Erro ao salvar.", "erro");
      } finally {
        btn.disabled = false;
        btn.innerHTML = "💾 Salvar Cliente";
      }
    }

    // ── Excluir ──────────────────────────────────────────────
    async function excluirCliente(id, nome) {
      if (!confirm(`Excluir "${nome}"? Irreversível.`)) return;
      const card = document.getElementById(`card-${id}`);
      if (card) card.style.opacity = ".4";
      try {
        const res = await fetch(`${API_URL}?action=excluir&id=${encodeURIComponent(id)}`);
        const data = await res.json();
        if (!data.sucesso) throw new Error(data.mensagem);
        toast(`🗑️ ${nome} excluído.`, "info");
        await carregarClientes();
      } catch (err) {
        if (card) card.style.opacity = "1";
        toast(err.message || "Erro ao excluir.", "erro");
      }
    }

    // ── Toggle link ──────────────────────────────────────────
    async function toggleLink(id, novoStatus) {
      try {
        const res = await fetch(`${API_URL}?${new URLSearchParams({ action: "toggleLink", id, status: novoStatus })}`);
        const data = await res.json();
        if (!data.sucesso) throw new Error(data.mensagem);
        toast(novoStatus ? "⭐ Marcado como enviado!" : "↩️ Marcado como pendente.", novoStatus ? "sucesso" : "info");
        await carregarClientes();
      } catch (err) {
        toast(err.message || "Erro ao atualizar.", "erro");
      }
    }

    function abrirWhatsApp(tel) {
      const n = String(tel).replace(/\D/g, "");
      window.open(`https://wa.me/${n.startsWith("55") ? n : "55"+n}`, "_blank");
    }

    function escapeHtml(str) {
      return String(str || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
    }

    // Máscara telefone — formulário principal
    document.getElementById("inp-tel").addEventListener("input", function () {
      aplicarMascaraTel(this);
    });
    // Máscara telefone — modal edição
    document.getElementById("edit-tel").addEventListener("input", function () {
      aplicarMascaraTel(this);
    });

    function aplicarMascaraTel(el) {
      let v = el.value.replace(/\D/g, "").slice(0, 11);
      if (v.length > 10) v = v.replace(/^(\d{2})(\d{5})(\d{4})$/, "($1) $2-$3");
      else if (v.length > 6) v = v.replace(/^(\d{2})(\d{4})(\d*)$/, "($1) $2-$3");
      else if (v.length > 2) v = v.replace(/^(\d{2})(\d*)$/, "($1) $2");
      el.value = v;
    }

    ["inp-nome","inp-tel","inp-desc"].forEach(id => {
      document.getElementById(id).addEventListener("keydown", e => {
        if (e.key === "Enter" && !e.shiftKey) salvarCliente();
      });
    });

    // Fechar modais clicando no overlay
    document.getElementById("modal-aniv").addEventListener("click", function(e) { if (e.target === this) fecharModalAniv(); });
    document.getElementById("modal-edit").addEventListener("click", function(e) { if (e.target === this) fecharModalEdit(); });

    // Init
    window.addEventListener("DOMContentLoaded", () => {
      fetch(`${API_URL}?action=listar`)
        .then(r => r.json())
        .then(d => {
          if (d.sucesso) {
            todosClientes = d.clientes || [];
            listaCarregada = true;
            atualizarBadge(todosClientes.length);
            const anivHoje = todosClientes.filter(c => ehAniversarioHoje(c.aniversario));
            if (anivHoje.length > 0) mostrarModalAniversario(anivHoje);
          }
        }).catch(() => {});
    });
  </script>
</body>
</html>
