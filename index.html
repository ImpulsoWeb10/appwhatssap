<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Controle de Clientes</title>

<style>
body {
  font-family: Arial;
  background:#f4f6f8;
  padding:20px;
}

.container {
  max-width:700px;
  margin:auto;
}

h1 {
  text-align:center;
}

.form {
  background:#fff;
  padding:15px;
  border-radius:10px;
  margin-bottom:20px;
}

input, textarea {
  width:100%;
  padding:10px;
  margin-bottom:10px;
  border-radius:6px;
  border:1px solid #ccc;
}

button {
  width:100%;
  padding:12px;
  background:#25D366;
  color:#fff;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.card {
  background:#fff;
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.btn {
  background:#25D366;
  color:#fff;
  padding:8px;
  border-radius:6px;
  text-decoration:none;
}

#toast {
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#333;
  color:#fff;
  padding:10px;
  border-radius:6px;
  opacity:0;
}

#toast.show {
  opacity:1;
}
</style>
</head>

<body>

<div class="container">

<h1>Controle de Clientes</h1>

<div class="form">
<input id="nome" placeholder="Nome do cliente">
<input id="telefone" placeholder="Telefone">
<textarea id="descricao" placeholder="O que ele levou"></textarea>
<button onclick="salvarCliente()">Salvar Cliente</button>
</div>

<div id="lista"></div>

</div>

<div id="toast"></div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwPSmpusUrkztIp2_YLLbcJ3KGUUCJWTyRqoG860Tw6zqAADnn0793XGmMgzI0i2flohg/exec";

/* TOAST */
function showToast(msg){
  const t = document.getElementById('toast');
  if(!t) return;
  t.textContent = msg;
  t.className = 'show';
  setTimeout(()=>t.className='',3000);
}

/* TELEFONE */
function limparTelefone(t){
  return t.replace(/\D/g,'');
}

/* API */
async function api(action,data={}){
  try{
    const res = await fetch(API_URL,{
      method:'POST',
      body:new URLSearchParams({action,...data})
    });

    const text = await res.text();

    try{
      return JSON.parse(text);
    }catch{
      console.error("Resposta inválida:",text);
      return null;
    }

  }catch(e){
    console.error("Erro fetch:",e);
    return null;
  }
}

/* SALVAR */
async function salvarCliente(){
  const nomeEl = document.getElementById('nome');
  const telEl = document.getElementById('telefone');
  const descEl = document.getElementById('descricao');

  const nome = nomeEl.value.trim();
  const telefone = limparTelefone(telEl.value);
  const descricao = descEl.value.trim();

  if(!nome || !telefone){
    showToast("Preencha os campos");
    return;
  }

  const res = await api("salvar",{nome,telefone,descricao});

  if(!res){
    showToast("Erro na API");
    return;
  }

  if(res.error){
    showToast(res.error);
    return;
  }

  showToast("Salvo!");

  nomeEl.value="";
  telEl.value="";
  descEl.value="";

  carregarClientes();
}

/* LISTAR */
async function carregarClientes(){
  const lista = document.getElementById('lista');

  lista.innerHTML="Carregando...";

  const clientes = await api("listar");

  if(!clientes){
    lista.innerHTML="Erro ao carregar";
    return;
  }

  if(clientes.length===0){
    lista.innerHTML="Nenhum cliente";
    return;
  }

  lista.innerHTML = clientes.map(c=>{
    const msg = encodeURIComponent(`Olá ${c.nome}, poderia avaliar nosso serviço?`);
    const wa = `https://wa.me/${c.telefone}?text=${msg}`;

    return `
      <div class="card">
        <div>
          <b>${c.nome}</b><br>
          ${c.telefone}<br>
          ${c.descricao || ''}
        </div>
        <a class="btn" target="_blank" href="${wa}">Whats</a>
      </div>
    `;
  }).join('');
}

/* INIT */
window.onload = ()=>{
  console.log("App iniciado");
  carregarClientes();
}
</script>

</body>
</html>
