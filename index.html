<script>
const API_URL = "https://script.google.com/macros/s/AKfycbylwmrBqDfi4Yr-wYwu3xPjaAcARaBTGcflz4gP_3cbp_fYyqGU2kV8aM0jzf888XosyA/exec";

/* Toast seguro */
function showToast(msg, tipo = 'success') {
  const t = document.getElementById('toast');
  if (!t) {
    console.warn("Toast não encontrado:", msg);
    return;
  }
  t.textContent = msg;
  t.className = `show ${tipo}`;
  setTimeout(() => { t.className = ''; }, 3000);
}

/* SALVAR */
async function salvarCliente() {
  try {
    const nome = document.getElementById('nome')?.value.trim();
    const telefone = document.getElementById('telefone')?.value.replace(/\D/g,'');
    const descricao = document.getElementById('descricao')?.value.trim();

    if (!nome || !telefone) {
      showToast('Preencha nome e telefone', 'error');
      return;
    }

    const res = await fetch(`${API_URL}?action=salvar&nome=${encodeURIComponent(nome)}&telefone=${telefone}&descricao=${encodeURIComponent(descricao)}`);
    const data = await res.json();

    if (data.error) {
      showToast(data.error, 'error');
      return;
    }

    showToast('Salvo!');
    carregarClientes();

  } catch (e) {
    console.error("Erro salvar:", e);
    showToast('Erro ao salvar', 'error');
  }
}

/* CARREGAR */
async function carregarClientes() {
  try {
    const res = await fetch(`${API_URL}?action=listar`);
    const clientes = await res.json();

    console.log("Clientes:", clientes);

    renderLista(clientes || []);
    atualizarStats(clientes || []);

  } catch (e) {
    console.error("Erro carregar:", e);
    showToast('Erro ao carregar', 'error');
  }
}

/* RENDER */
function renderLista(clientes) {
  const lista = document.getElementById('lista');

  if (!lista) {
    console.error("Elemento #lista não existe");
    return;
  }

  if (!clientes.length) {
    lista.innerHTML = '<p style="padding:20px">Nenhum cliente</p>';
    return;
  }

  lista.innerHTML = clientes.map(c => `
    <div style="padding:10px;border:1px solid #ccc;margin-bottom:10px;">
      <b>${c.nome}</b><br>
      ${c.telefone}<br>
      ${c.descricao || ''}
    </div>
  `).join('');
}

/* STATS */
function atualizarStats(clientes) {
  const totalEl = document.getElementById('statTotal');
  if (totalEl) totalEl.textContent = clientes.length;
}

/* INIT */
window.onload = () => {
  console.log("App iniciado");
  carregarClientes();
};
</script>
