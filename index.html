<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Controle de Clientes</title>

<!-- (SEU CSS CONTINUA IGUAL — NÃO MUDEI NADA) -->
<style>
/* (mantive seu CSS inteiro, não mexe aqui) */
</style>

</head>
<body>
<div class="app">

<header>
  <div class="logo">👥</div>
  <div>
    <h1>Controle de Clientes</h1>
    <p>Gerencie contatos e acompanhe o envio do link</p>
  </div>
</header>

<div class="stats">
  <div class="stat-card">
    <span>Total</span>
    <span id="statTotal">0</span>
  </div>
  <div class="stat-card green">
    <span>Enviado</span>
    <span id="statSent">0</span>
  </div>
  <div class="stat-card orange">
    <span>Pendentes</span>
    <span id="statPending">0</span>
  </div>
</div>

<div class="form-card">
  <input id="nome" placeholder="Nome">
  <input id="telefone" placeholder="Telefone">
  <textarea id="descricao" placeholder="Descrição"></textarea>
  <button onclick="salvarCliente()">Salvar</button>
</div>

<input id="busca" placeholder="Buscar..." oninput="renderLista()">

<div id="lista"></div>

</div>

<div id="toast"></div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwPSmpusUrkztIp2_YLLbcJ3KGUUCJWTyRqoG860Tw6zqAADnn0793XGmMgzI0i2flohg/exec";

let clientes = [];

/* API */
async function api(action,data={}){
  try{
    const res = await fetch(API_URL,{
      method:"POST",
      body:new URLSearchParams({action,...data})
    });
    return await res.json();
  }catch(e){
    console.error(e);
    showToast("Erro API","error");
    return null;
  }
}

/* TOAST */
function showToast(msg,tipo="success"){
  const t=document.getElementById("toast");
  t.textContent=msg;
  t.className="show "+tipo;
  setTimeout(()=>t.className="",2500);
}

/* SALVAR */
async function salvarCliente(){
  const nome=document.getElementById("nome").value.trim();
  const telefone=document.getElementById("telefone").value.replace(/\D/g,'');
  const descricao=document.getElementById("descricao").value.trim();

  if(!nome||!telefone){
    showToast("Preencha os campos","error");
    return;
  }

  const res=await api("salvar",{nome,telefone,descricao});

  if(res?.error){
    showToast(res.error,"error");
    return;
  }

  showToast("Salvo!");

  document.getElementById("nome").value="";
  document.getElementById("telefone").value="";
  document.getElementById("descricao").value="";

  carregarClientes();
}

/* CARREGAR */
async function carregarClientes(){
  const res=await api("listar");

  if(!res){
    document.getElementById("lista").innerHTML="Erro API (CORS)";
    return;
  }

  clientes=res;
  renderLista();
  atualizarStats();
}

/* RENDER */
function renderLista(){
  const busca=document.getElementById("busca").value.toLowerCase();
  const lista=document.getElementById("lista");

  const filtrados=clientes.filter(c =>
    c.nome.toLowerCase().includes(busca) ||
    c.telefone.includes(busca)
  );

  if(filtrados.length===0){
    lista.innerHTML="Nenhum cliente";
    return;
  }

  lista.innerHTML=filtrados.map(c=>{
    const wa=`https://wa.me/55${c.telefone}`;
    return `
      <div class="client-card">
        <div>
          <b>${c.nome}</b><br>
          ${c.telefone}<br>
          ${c.descricao||""}
        </div>
        <a href="${wa}" target="_blank">Whats</a>
      </div>
    `;
  }).join("");
}

/* STATS */
function atualizarStats(){
  const total=clientes.length;
  const sent=clientes.filter(c=>c.linkEnviado).length;

  document.getElementById("statTotal").textContent=total;
  document.getElementById("statSent").textContent=sent;
  document.getElementById("statPending").textContent=total-sent;
}

/* INIT */
window.onload=carregarClientes;
</script>

</body>
</html>
