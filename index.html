<script>
const API_URL = "https://script.google.com/macros/s/AKfycbylwmrBqDfi4Yr-wYwu3xPjaAcARaBTGcflz4gP_3cbp_fYyqGU2kV8aM0jzf888XosyA/exec";

/* ================= TOAST ================= */
function showToast(msg, tipo = 'success') {
  const t = document.getElementById('toast');
  if (!t) return;
  t.textContent = msg;
  t.className = `show ${tipo}`;
  setTimeout(() => t.className = '', 3000);
}

/* ================= UTIL ================= */
function limparTelefone(tel) {
  return tel.replace(/\D/g, '');
}

/* ================= API ================= */
async function api(action, data = {}) {
  try {
    const res = await fetch(API_URL, {
      method: "POST",
      body: new URLSearchParams({ action, ...data })
    });

    const text = await res.text();

    try {
      return JSON.parse(text);
    } catch (e) {
      console.error("Resposta inválida:", text);
      showToast("Erro na API", "error");
      return null;
    }

  } catch (e) {
    console.error("Erro conexão:", e);
    showToast("Erro de conexão", "error");
    return null;
  }
}

/* ================= SALVAR ================= */
async function salvarCliente() {
  const nome = document.getElementById('nome')?.value.trim();
  const telefone = limparTelefone(document.getElementById('telefone')?.value);
  const descricao = document.getElementById('descricao')?.value.trim();

  if (!nome || !telefone) {
    showToast("Preencha nome e telefone", "error");
    return;
  }

  const res = await api("salvar", { nome, telefone, descricao });

  if (!res) return;

  if (res.error) {
    showToast(res.error, "error");
    return;
  }

  showToast("Cliente salvo!");

  document.getElementById('nome').value = "";
  document.getElementById('telefone').value = "";
  document.getElementById('descricao').value = "";

  carregarClientes();
}

/* ================= LISTAR ================= */
async function carregarClientes() {
  const listaEl = document.getElementById('lista');

  if (!listaEl) {
    console.error("Elemento #lista não encontrado");
    return;
  }

  listaEl.innerHTML = "<div style='padding:20px'>Carregando...</div>";

  const clientes = await api("listar");

  if (!clientes || !Array.isArray(clientes)) {
    listaEl.innerHTML = "<div style='padding:20px'>Erro ao carregar</div>";
    atualizarStats([]);
    return;
  }

  renderLista(clientes);
  atualizarStats(clientes);
}

/* ================= RENDER ================= */
function renderLista(clientes) {
  const lista = document.getElementById('lista');
  if (!lista) return;

  if (clientes.length === 0) {
    lista.innerHTML = "<div style='padding:20px'>Nenhum cliente</div>";
    return;
  }

  lista.innerHTML = clientes.map(c => {
    const msg = encodeURIComponent(`Olá ${c.nome}, poderia avaliar nosso serviço?`);
    const wa = `https://wa.me/${c.telefone}?text=${msg}`;

    return `
      <div class="client-card ${c.linkEnviado ? 'sent' : ''}">
        <div class="avatar">${c.nome ? c.nome[0] : "?"}</div>

        <div class="client-info">
          <div class="name">${c.nome || ''}</div>
          <div class="phone">${c.telefone || ''}</div>
          <div class="desc">${c.descricao || ''}</div>
          ${c.linkEnviado ? '<span class="badge-sent">⭐ Enviado</span>' : ''}
        </div>

        <div class="client-actions">
          <a href="${wa}" target="_blank" class="btn btn-sm btn-whats">📲</a>
        </div>
      </div>
    `;
  }).join('');
}

/* ================= STATS ================= */
function atualizarStats(clientes) {
  const total = clientes.length;
  const enviados = clientes.filter(c => c.linkEnviado).length;

  document.getElementById('statTotal').textContent = total;
  document.getElementById('statSent').textContent = enviados;
  document.getElementById('statPending').textContent = total - enviados;
}

/* ================= INIT ================= */
window.onload = () => {
  console.log("App iniciado");
  carregarClientes();
};
</script>
